{% extends "_base.html" %}
{% block content %}
<h2>Заключение контракта для: {{ lead.full_name }}</h2>
<form method="post" enctype="multipart/form-data" class="mt-4">
    {% csrf_token %}
    {{ form.errors }}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Подтвердить и перевести в активные</button>
</form>
{% endblock %}
