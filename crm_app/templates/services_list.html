{% extends "_base.html" %}

{% block content %}
<h2>Список услуг</h2>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Название</th>
            <th>Описание</th>
            <th>Стоимость</th>
        </tr>
    </thead>
    <tbody>
        {% for service in services %}
        <tr>
            <td>{{ service.name }}</td>
            <td>{{ service.description }}</td>
            <td>{{ service.cost }} руб.</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="3">Услуг пока нет. Добавьте их в админке.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
